name: Telegram Translator Bot

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-bot]

concurrency:
  group: telegram-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install telethon deep-translator

      - name: Run bot
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python telegram_translator_bot.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "telegram-bot"
          git config user.email "telegram-bot@users.noreply.github.com"
          git add state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state yeniləndi [skip ci]"
          git pull --rebase --autostash || true
          git push
