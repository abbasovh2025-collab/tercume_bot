name: Telegram Translator Bot

on:
  schedule:
    - cron: '*/30 * * * *'   # h蓹r 30 d蓹qiq蓹d蓹n bir (GitHub-un texniki minimumu 5 d蓹qiq蓹dir,
                              # amma "q谋z谋l orta" 眉莽眉n a艧a臒谋dak谋 izaha bax)
  workflow_dispatch:          # ist蓹s蓹niz 蓹l il蓹 d蓹 i艧蓹 sala bil蓹rsiniz

# 茝vv蓹lki run h蓹l蓹 bitm蓹yibs蓹, YEN陌 run onu YARIM脟IQ k蓹sm蓹k 蓹v蓹zin蓹 n枚vb蓹y蓹 d眉艧眉r.
# Bu, eyni mesaj谋n 2 d蓹f蓹 g枚nd蓹rilm蓹sinin (overlap-dan yaranan spam) qar艧谋s谋n谋 al谋r.
concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon deepl deep-translator

      - name: Run bot
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python telegram_translator_bot.py

      # state.json (last_id + mesaj uy臒unluq x蓹rit蓹si) v蓹 sessiya fayllar谋
      # d蓹yi艧ibs蓹, geri repoya commit olunur ki, n枚vb蓹ti run "s谋f谋rdan" ba艧lamas谋n.
      - name: Persist state
        run: |
          git config user.name "telegram-bot"
          git config user.email "telegram-bot@users.noreply.github.com"
          git add state.json bot.log *.session 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state yenil蓹ndi [skip ci]"
          git push
