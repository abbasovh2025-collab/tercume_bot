name: Telegram Translator Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: false

# BUG FIX: bunsuz GITHUB_TOKEN read-only ola bilər və "git push" 403 ilə uğursuz olar.
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install telethon deep-translator

      - name: Run bot
        run: python telegram_translator_bot.py

      # BUG FIX: if: always() olmasa, bot.py xəta ilə dayansa state heç saxlanmır.
      - name: Persist state
        if: always()
        run: |
          git config user.name "telegram-bot"
          git config user.email "telegram-bot@users.noreply.github.com"
          # bot.log İSTƏMİRİK commit etmək — repo şişər, .gitignore-a əlavə edin
          git add state.json *.session 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state yeniləndi [skip ci]"
          git pull --rebase --autostash || true
          git push
